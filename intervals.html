<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(51, 65, 85, 0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.05) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cof-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            margin: 0 auto;
        }

        .cof-ring {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cof-note {
            position: absolute;
            width: 54px;
            height: 54px;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            background: #1e293b;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: #94a3b8;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            line-height: 1;
        }

        .cof-note.active {
            background: var(--accent);
            color: #020617;
            border-color: #fff;
            transform: translate(-50%, -50%) scale(1.2);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            z-index: 10;
        }

        .logic-center {
            position: absolute;
            inset: 70px;
            background: radial-gradient(circle, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .modern-toggle {
            display: inline-flex;
            background: rgba(15, 23, 42, 0.8);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 2px;
        }

        .toggle-btn {
            padding: 8px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            flex-grow: 1;
        }

        .toggle-btn.active {
            background: #334155;
            color: var(--accent);
        }

        .card-container { perspective: 1200px; width: 100%; }
        .reveal-card {
            height: 450px;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .reveal-card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
            border: 1px solid var(--border);
        }
        .card-front { background: linear-gradient(145deg, #1e293b, #0f172a); }
        .card-back {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            transform: rotateY(180deg);
        }

        .interval-pill {
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .interval-pill.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto pt-4">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tight text-white flex items-center gap-3">
                <span class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white text-base shadow-lg shadow-sky-500/20">I</span>
                INTERVAL<span class="text-sky-400">PRO</span>
            </h1>
            <div id="status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 border border-slate-800">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
                <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Ready</span>
            </div>
        </header>

        <div id="setup-view" class="space-y-8 animate-in fade-in duration-500">
            <div class="glass-panel p-8 md:p-12 relative overflow-hidden">
                <div class="relative z-10 flex flex-col items-center">
                    <div class="flex flex-wrap justify-center gap-4 mb-10">
                        <div class="modern-toggle" id="circle-mode-toggle">
                            <div class="toggle-btn active" data-value="fifth">5ths (#)</div>
                            <div class="toggle-btn" data-value="fourth">4ths (♭)</div>
                        </div>
                        <div class="modern-toggle" id="key-quality-toggle">
                            <div class="toggle-btn active" data-value="major">Major</div>
                            <div class="toggle-btn" data-value="minor">Minor</div>
                        </div>
                    </div>
                    
                    <div class="cof-container">
                        <div id="cof-ring" class="cof-ring"></div>
                        <div class="logic-center pointer-events-none">
                            <div class="flex flex-col items-center pointer-events-auto text-center">
                                <p class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Key Logic</p>
                                <div class="modern-toggle scale-90 mb-4" data-id="rootLogic">
                                    <div class="toggle-btn active" data-value="fixed">Focus</div>
                                    <div class="toggle-btn" data-value="shuffle">Global</div>
                                </div>
                                <h2 id="key-display" class="text-3xl font-black text-white uppercase tracking-tighter">C Major</h2>
                                <p id="logic-desc" class="text-[8px] font-bold text-sky-400 mt-2 uppercase tracking-widest opacity-60">Root Note Only</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 glass-panel p-8">
                    <div class="flex justify-between items-center mb-6">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Target Intervals</label>
                        <button id="toggle-all-intervals" class="text-[10px] font-bold text-sky-400 hover:text-sky-300 transition-colors uppercase tracking-widest">Select All</button>
                    </div>
                    <div id="interval-grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-7 gap-2"></div>
                </div>

                <div class="space-y-6">
                    <div class="glass-panel p-8 space-y-6">
                        <div class="space-y-3">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Focus Root Degree</label>
                            <div class="modern-toggle w-full grid grid-cols-4" data-id="rootDegree">
                                <div class="toggle-btn active" data-value="any">Any</div>
                                <div class="toggle-btn" data-value="1">1st</div>
                                <div class="toggle-btn" data-value="2">2nd</div>
                                <div class="toggle-btn" data-value="3">3rd</div>
                                <div class="toggle-btn" data-value="4">4th</div>
                                <div class="toggle-btn" data-value="5">5th</div>
                                <div class="toggle-btn" data-value="6">6th</div>
                                <div class="toggle-btn" data-value="7">7th</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Display</label>
                                <div class="modern-toggle w-full" data-id="displayMode">
                                    <div class="toggle-btn active" data-value="letter">Letter</div>
                                    <div class="toggle-btn" data-value="number">Scale</div>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Direction</label>
                                <div class="modern-toggle w-full" data-id="direction">
                                    <div class="toggle-btn active" data-value="up">Up</div>
                                    <div class="toggle-btn" data-value="down">Down</div>
                                    <div class="toggle-btn" data-value="both">Both</div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Reveal Timer</label>
                                <select id="timer-select" class="w-full bg-slate-900 border border-slate-800 text-white rounded-xl p-2 text-xs appearance-none">
                                    <option value="0">Manual</option>
                                    <option value="5">5s</option>
                                    <option value="10">10s</option>
                                    <option value="15">15s</option>
                                    <option value="30">30s</option>
                                </select>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Exhaust</label>
                                <div class="modern-toggle w-full" data-id="noRepeats">
                                    <div class="toggle-btn" data-value="false">No</div>
                                    <div class="toggle-btn active" data-value="true">Yes</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="start-btn" class="w-full py-6 bg-sky-500 hover:bg-sky-400 text-slate-950 font-black rounded-3xl shadow-2xl shadow-sky-500/20 transition-all hover:scale-[1.02] active:scale-95 uppercase tracking-[0.2em] text-sm">
                        Start Session
                    </button>
                </div>
            </div>
        </div>

        <div id="study-view" class="hidden animate-in slide-in-from-bottom-8 duration-500">
            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-panel p-8 space-y-8">
                        <div>
                            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Session Status</h4>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center py-2 border-b border-slate-800">
                                    <span class="text-xs text-slate-400">Context</span>
                                    <span id="study-key-pill" class="text-xs font-bold text-sky-400 uppercase">C MAJOR</span>
                                </div>
                                <div id="deck-tracker" class="flex justify-between items-center py-2">
                                    <span class="text-xs text-slate-400">Progress</span>
                                    <span id="deck-count" class="px-2 py-1 bg-sky-500/20 text-sky-400 rounded-md text-xs font-black">0</span>
                                </div>
                            </div>
                        </div>

                        <div id="timer-container" class="hidden space-y-3">
                            <div class="flex justify-between items-center">
                                <label id="timer-phase-label" class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-sky-500">Auto-Reveal</label>
                                <span id="timer-label" class="text-[10px] font-black text-sky-500 tabular-nums"></span>
                            </div>
                            <div class="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                                <div id="timer-bar" class="h-full bg-sky-500 transition-all duration-100 ease-linear" style="width: 100%"></div>
                            </div>
                        </div>

                        <button id="stop-btn" class="w-full py-4 border border-slate-800 hover:bg-red-500/10 hover:border-red-500/50 text-slate-500 hover:text-red-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest transition-all">
                            Exit to Menu
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-8 flex flex-col gap-6">
                    <div class="grid md:grid-cols-2 gap-6 flex-1">
                        <div class="glass-panel p-12 flex flex-col justify-center items-center text-center">
                            <div class="mb-4">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4" id="starting-note-label">Starting Note</p>
                                <div id="root-display" class="text-9xl font-black text-white tracking-tighter leading-none">C</div>
                            </div>
                            <div class="mt-8 pt-8 border-t border-slate-800 w-full">
                                <h3 id="interval-tag" class="text-2xl font-black text-sky-400 tracking-tight uppercase leading-snug">Perfect 5th Up</h3>
                            </div>
                        </div>

                        <div class="card-container">
                            <div id="reveal-card" class="reveal-card">
                                <div class="card-face card-front group">
                                    <div class="w-20 h-20 rounded-full border-2 border-slate-700 flex items-center justify-center mb-6 group-hover:border-sky-500 transition-all group-hover:scale-110">
                                        <span class="text-slate-500 group-hover:text-sky-500 font-bold text-xl">?</span>
                                    </div>
                                    <span class="text-slate-600 font-bold text-[10px] uppercase tracking-widest">Tap to reveal</span>
                                </div>
                                <div class="card-face card-back">
                                    <div id="target-display" class="text-[9rem] font-black text-white drop-shadow-2xl">G</div>
                                    <div id="target-desc" class="mt-4 text-[10px] font-black uppercase tracking-[0.3em] text-white/60">Target Note</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="next-btn" class="w-full py-8 bg-white text-slate-950 hover:bg-slate-100 rounded-[2.5rem] font-black transition-all shadow-2xl shadow-white/5 uppercase tracking-[0.2em] text-sm">
                        Next Interval
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FLAT = '♭', SHARP = '♯';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'beep') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'bell') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            }
        }

        const DATA = {
            fifth: ['C', 'G', 'D', 'A', 'E', 'B', `F${SHARP}`, `C${SHARP}`, `A${FLAT}`, `E${FLAT}`, `B${FLAT}`, 'F'],
            fourth: ['C', 'F', `B${FLAT}`, `E${FLAT}`, `A${FLAT}`, `D${FLAT}`, `G${FLAT}`, `B`, `E`, `A`, `D`, `G`],
            majorScales: {
                'C': ['C', 'D', 'E', 'F', 'G', 'A', 'B'],
                'G': ['G', 'A', 'B', 'C', 'D', 'E', `F${SHARP}`],
                'D': ['D', 'E', `F${SHARP}`, 'G', 'A', 'B', `C${SHARP}`],
                'A': ['A', 'B', `C${SHARP}`, 'D', 'E', `F${SHARP}`, `G${SHARP}`],
                'E': ['E', `F${SHARP}`, `G${SHARP}`, 'A', 'B', `C${SHARP}`, `D${SHARP}`],
                'B': ['B', `C${SHARP}`, `D${SHARP}`, 'E', `F${SHARP}`, `G${SHARP}`, `A${SHARP}`],
                [`F${SHARP}`]: [`F${SHARP}`, `G${SHARP}`, `A${SHARP}`, 'B', `C${SHARP}`, `D${SHARP}`, `E${SHARP}`],
                [`C${SHARP}`]: [`C${SHARP}`, `D${SHARP}`, `E${SHARP}`, `F${SHARP}`, `G${SHARP}`, `A${SHARP}`, `B${SHARP}`],
                [`A${FLAT}`]: [`A${FLAT}`, `B${FLAT}`, 'C', `D${FLAT}`, `E${FLAT}`, 'F', 'G'],
                [`E${FLAT}`]: [`E${FLAT}`, 'F', 'G', `A${FLAT}`, `B${FLAT}`, 'C', 'D'],
                [`B${FLAT}`]: [`B${FLAT}`, 'C', 'D', `E${FLAT}`, 'F', 'G', 'A'],
                'F': ['F', 'G', 'A', `B${FLAT}`, 'C', 'D', 'E']
            },
            relativeMinor: {
                'C': 'Am', 'G': 'Em', 'D': 'Bm', 'A': 'F#m', 'E': 'C#m', 'B': 'G#m',
                [`F${SHARP}`]: 'D#m', [`C${SHARP}`]: 'A#m', [`G${FLAT}`]: 'Ebm', 
                [`D${FLAT}`]: 'Bbm', [`A${FLAT}`]: 'Fm', [`E${FLAT}`]: 'Cm', [`B${FLAT}`]: 'Gm', 'F': 'Dm'
            }
        };

        const INTERVAL_DATA = {
            'm2': [1, 2, 'Minor 2nd'], 'M2': [2, 2, 'Major 2nd'],
            'm3': [3, 3, 'Minor 3rd'], 'M3': [4, 3, 'Major 3rd'],
            'P4': [5, 4, 'Perfect 4th'], 'A4': [6, 4, 'Aug 4th'],
            'P5': [7, 5, 'Perfect 5th'], 'm6': [8, 6, 'Minor 6th'],
            'M6': [9, 6, 'Major 6th'], 'm7': [10, 7, 'Minor 7th'],
            'M7': [11, 7, 'Major 7th'], 'P8': [12, 8, 'Octave'],
            'm9': [13, 9, 'Minor 9th'], 'M9': [14, 9, 'Major 9th'],
            'P11': [17, 11, 'Perfect 11th'], 'A11': [18, 11, 'Aug 11th'],
            'm13': [20, 13, 'Minor 13th'], 'M13': [21, 13, 'Major 13th']
        };

        let config = {
            selectedKey: 'C',
            circleMode: 'fifth',
            keyQuality: 'major',
            activeIntervals: ['m3', 'M3', 'P4', 'P5', 'M9'],
            direction: 'up',
            rootLogic: 'fixed',
            rootDegree: 'any',
            displayMode: 'letter',
            noRepeats: 'true',
            timer: 0
        };

        let timerInterval, deck = [], isRevealed = false;

        function renderCircle() {
            const ring = document.getElementById('cof-ring');
            if (!ring) return;
            ring.innerHTML = '';
            const notes = config.circleMode === 'fifth' ? DATA.fifth : DATA.fourth;
            const radius = ring.offsetWidth / 2 - 25;
            const centerX = ring.offsetWidth / 2;
            const centerY = ring.offsetHeight / 2;

            notes.forEach((note, i) => {
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                const el = document.createElement('div');
                el.className = `cof-note ${note === config.selectedKey ? 'active' : ''}`;
                el.style.left = `${x}px`; el.style.top = `${y}px`;
                const minor = DATA.relativeMinor[note] || '';
                el.innerHTML = `<span>${note}</span><span class="text-[0.6rem] opacity-60 font-normal mt-0.5">${minor}</span>`;
                el.onclick = () => {
                    config.selectedKey = note;
                    document.querySelectorAll('.cof-note').forEach(n => n.classList.remove('active'));
                    el.classList.add('active');
                    updateKeyDisplay();
                };
                ring.appendChild(el);
            });
        }

        function updateKeyDisplay() {
            const label = config.keyQuality === 'major' ? `${config.selectedKey} Major` : `${DATA.relativeMinor[config.selectedKey]} Minor`;
            document.getElementById('key-display').textContent = label;
            let desc = config.rootLogic === 'shuffle' ? "Global Shuffle (All Keys)" : 
                       (config.rootDegree === 'any' ? "Focus: Shuffling Scale Degrees" : `Focus: Degree ${config.rootDegree} Only`);
            document.getElementById('logic-desc').textContent = desc;
        }

        function initUI() {
            const grid = document.getElementById('interval-grid');
            grid.innerHTML = '';
            Object.keys(INTERVAL_DATA).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `py-2.5 rounded-xl text-[10px] font-extrabold interval-pill ${config.activeIntervals.includes(key) ? 'active' : 'text-slate-500 bg-slate-800/50'}`;
                btn.textContent = key;
                btn.onclick = () => {
                    if (config.activeIntervals.includes(key)) {
                        config.activeIntervals = config.activeIntervals.filter(i => i !== key);
                        btn.classList.remove('active'); btn.classList.add('bg-slate-800/50', 'text-slate-500');
                    } else {
                        config.activeIntervals.push(key);
                        btn.classList.add('active'); btn.classList.remove('bg-slate-800/50', 'text-slate-500');
                    }
                    updateSelectAllBtn();
                };
                grid.appendChild(btn);
            });

            document.querySelectorAll('.modern-toggle').forEach(group => {
                const id = group.dataset.id;
                group.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.onclick = () => {
                        group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        config[id] = btn.dataset.value;
                        updateKeyDisplay();
                    };
                });
            });

            document.getElementById('circle-mode-toggle').querySelectorAll('.toggle-btn').forEach(btn => {
                btn.onclick = () => {
                    document.getElementById('circle-mode-toggle').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    config.circleMode = btn.dataset.value;
                    renderCircle();
                };
            });

            document.getElementById('key-quality-toggle').querySelectorAll('.toggle-btn').forEach(btn => {
                btn.onclick = () => {
                    document.getElementById('key-quality-toggle').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    config.keyQuality = btn.dataset.value;
                    renderCircle(); updateKeyDisplay();
                };
            });

            document.getElementById('timer-select').onchange = (e) => config.timer = parseInt(e.target.value);
            renderCircle();
            window.addEventListener('resize', renderCircle);
        }

        function updateSelectAllBtn() {
            const btn = document.getElementById('toggle-all-intervals');
            const total = Object.keys(INTERVAL_DATA).length;
            btn.textContent = config.activeIntervals.length === total ? "Deselect All" : "Select All";
        }

        function getCorrectSpelling(startNote, semitones, intervalSize, direction) {
            const alphabet = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const pitchMap = {'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3, 'E': 4, 'Fb': 4, 'E#': 5, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8, 'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11, 'Cb': 11, 'B#': 0};
            let startLetter = startNote[0], startIndex = alphabet.indexOf(startLetter);
            let targetIndex = direction === 'up' ? (startIndex + (intervalSize - 1)) % 7 : (startIndex - (intervalSize - 1)) % 7;
            if (targetIndex < 0) targetIndex += 7;
            let targetLetter = alphabet[targetIndex];
            let startPitch = pitchMap[startNote] !== undefined ? pitchMap[startNote] : pitchMap[startLetter];
            let targetPitch = direction === 'up' ? (startPitch + semitones) % 12 : (startPitch - semitones) % 12;
            if (targetPitch < 0) targetPitch += 12;
            let baseTargetPitch = pitchMap[targetLetter];
            let diff = targetPitch - baseTargetPitch;
            if (diff > 6) diff -= 12; if (diff < -6) diff += 12;
            let accidental = diff === 1 ? SHARP : diff === 2 ? `${SHARP}${SHARP}` : diff === -1 ? FLAT : diff === -2 ? `${FLAT}${FLAT}` : '';
            return targetLetter + accidental;
        }

        function nextCard() {
            if (config.activeIntervals.length === 0) return;
            isRevealed = false;
            document.getElementById('reveal-card').classList.remove('is-flipped');
            
            let problem;
            if (config.noRepeats === 'true') {
                if (deck.length === 0) { exitSession(); return; }
                problem = deck.pop();
                document.getElementById('deck-count').textContent = deck.length;
            } else {
                let root;
                if (config.rootLogic === 'shuffle') {
                    root = DATA.fifth[Math.floor(Math.random() * 12)];
                } else {
                    const scale = DATA.majorScales[config.selectedKey];
                    root = config.rootDegree === 'any' ? scale[Math.floor(Math.random() * 7)] : scale[parseInt(config.rootDegree) - 1];
                }
                const intervalKey = config.activeIntervals[Math.floor(Math.random() * config.activeIntervals.length)];
                const dir = config.direction === 'both' ? (Math.random() > 0.5 ? 'up' : 'down') : config.direction;
                problem = { root, intervalKey, dir };
            }
            
            const data = INTERVAL_DATA[problem.intervalKey];
            const target = getCorrectSpelling(problem.root, data[0], data[1], problem.dir);
            let rootDisplay = problem.root;
            if (config.displayMode === 'number') {
                const scale = DATA.majorScales[config.selectedKey];
                if (scale) {
                    const idx = scale.indexOf(problem.root);
                    if (idx !== -1) rootDisplay = idx + 1;
                }
            }

            setTimeout(() => {
                document.getElementById('root-display').textContent = rootDisplay;
                document.getElementById('interval-tag').textContent = `${data[2]} ${problem.dir}`;
                document.getElementById('target-display').textContent = target;
                document.getElementById('study-key-pill').textContent = config.keyQuality === 'major' ? `${config.selectedKey} MAJOR` : `${DATA.relativeMinor[config.selectedKey]} MINOR`;
                startTimer(false); 
            }, 150);
        }

        function startTimer(revealPhase = false) {
            clearInterval(timerInterval);
            const val = parseInt(config.timer);
            if (val === 0) { document.getElementById('timer-container').classList.add('hidden'); return; }
            document.getElementById('timer-container').classList.remove('hidden');
            let time = val;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timerInterval = setInterval(() => {
                time -= 0.1;
                bar.style.width = `${(time/val)*100}%`;
                document.getElementById('timer-label').textContent = `${Math.ceil(time)}s`;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    if (!revealPhase) {
                        isRevealed = true; playSound('bell');
                        document.getElementById('reveal-card').classList.add('is-flipped');
                        startTimer(true);
                    } else nextCard();
                }
            }, 100);
        }

        function buildDeck() {
            deck = [];
            let roots = config.rootLogic === 'shuffle' ? DATA.fifth : 
                        (config.rootDegree === 'any' ? DATA.majorScales[config.selectedKey] : [DATA.majorScales[config.selectedKey][parseInt(config.rootDegree)-1]]);
            
            roots.forEach(r => {
                config.activeIntervals.forEach(i => {
                    if (config.direction === 'both') {
                        deck.push({ root: r, intervalKey: i, dir: 'up' });
                        deck.push({ root: r, intervalKey: i, dir: 'down' });
                    } else {
                        deck.push({ root: r, intervalKey: i, dir: config.direction });
                    }
                });
            });
            deck.sort(() => Math.random() - 0.5);
        }

        function exitSession() {
            document.getElementById('setup-view').classList.remove('hidden');
            document.getElementById('study-view').classList.add('hidden');
            clearInterval(timerInterval);
        }

        document.getElementById('start-btn').onclick = () => {
            if (config.activeIntervals.length === 0) return;
            buildDeck();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('study-view').classList.remove('hidden');
            nextCard();
        };

        document.getElementById('toggle-all-intervals').onclick = () => {
            const allSelected = config.activeIntervals.length === Object.keys(INTERVAL_DATA).length;
            config.activeIntervals = allSelected ? [] : Object.keys(INTERVAL_DATA);
            document.querySelectorAll('.interval-pill').forEach(btn => {
                if (allSelected) {
                    btn.classList.remove('active'); btn.classList.add('bg-slate-800/50', 'text-slate-500');
                } else {
                    btn.classList.add('active'); btn.classList.remove('bg-slate-800/50', 'text-slate-500');
                }
            });
            updateSelectAllBtn();
        };

        document.getElementById('reveal-card').onclick = () => {
            if (!isRevealed) {
                clearInterval(timerInterval); isRevealed = true;
                document.getElementById('reveal-card').classList.add('is-flipped');
                startTimer(true);
            } else nextCard();
        };

        document.getElementById('next-btn').onclick = nextCard;
        document.getElementById('stop-btn').onclick = exitSession;
        window.onload = () => { initUI(); updateSelectAllBtn(); updateKeyDisplay(); };
    </script>
</body>
</html>
