<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Mapper - Pro Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { transition: width 0.1s linear; }
        .active-int { background-color: #10b981 !important; border-color: #34d399 !important; color: white !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); transform: scale(1.05); }
        .btn-up.active { background-color: #fbbf24 !important; color: #000 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .btn-down.active { background-color: #ef4444 !important; color: #fff !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .btn-random.active { background-color: #10b981 !important; color: #fff !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn-time.active { background-color: #6366f1 !important; color: #fff !important; border-color: #818cf8 !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-500">
                Number Mapper
            </h1>
            <p class="text-slate-400 text-sm">Full Permutation Interval Trainer</p>
        </div>

        <div class="glass p-6 rounded-3xl shadow-2xl space-y-6">
            <!-- Interval Selection -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-500">Active Intervals</label>
                    <div class="flex gap-2">
                        <button onclick="bulkSelect(true)" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded-md border border-slate-700 transition uppercase font-bold text-slate-400">All</button>
                        <button onclick="bulkSelect(false)" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded-md border border-slate-700 transition uppercase font-bold text-slate-400">Clear</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="toggleInterval(2)" id="int-2" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">2nd</button>
                    <button onclick="toggleInterval(3)" id="int-3" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">3rd</button>
                    <button onclick="toggleInterval(4)" id="int-4" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">4th</button>
                    <button onclick="toggleInterval(5)" id="int-5" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">5th</button>
                    <button onclick="toggleInterval(6)" id="int-6" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">6th</button>
                    <button onclick="toggleInterval(7)" id="int-7" class="int-btn py-3 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 transition font-bold">7th</button>
                </div>
            </div>

            <!-- Direction & Session Settings -->
            <div class="grid grid-cols-1 gap-6 pt-2 border-t border-slate-800">
                <div class="space-y-3">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 text-center">Direction</label>
                    <div class="flex justify-between items-center bg-slate-900/50 p-1 rounded-2xl border border-slate-700">
                        <button onclick="setDirection('up')" id="dir-up" class="dir-btn btn-up flex-1 py-2 rounded-xl transition text-sm font-bold">Up</button>
                        <button onclick="setDirection('down')" id="dir-down" class="dir-btn btn-down flex-1 py-2 rounded-xl transition text-sm font-bold">Down</button>
                        <button onclick="setDirection('random')" id="dir-random" class="dir-btn btn-random flex-1 py-2 rounded-xl transition text-sm font-bold">Random</button>
                    </div>
                </div>

                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-3">
                        <div onclick="toggleNoRepeat()" id="repeat-toggle" class="w-12 h-6 bg-slate-700 rounded-full p-1 cursor-pointer transition-colors duration-300 relative">
                            <div id="toggle-circle" class="w-4 h-4 bg-white rounded-full transition-transform duration-300"></div>
                        </div>
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">No Repeat</span>
                    </div>
                    <div id="cycle-status" class="hidden flex items-center gap-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">Progress:</span>
                        <span id="cycle-counter" class="text-xs font-black text-emerald-400">0 / 0</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 text-center">Auto-Advance Timer</label>
                    <div class="grid grid-cols-5 gap-2">
                        <button onclick="setTimer(0)" id="time-0" class="time-btn btn-time py-2 rounded-lg bg-slate-800 text-[10px] font-bold border border-slate-700">OFF</button>
                        <button onclick="setTimer(10)" id="time-10" class="time-btn btn-time py-2 rounded-lg bg-slate-800 text-[10px] font-bold border border-slate-700 text-slate-400">10s</button>
                        <button onclick="setTimer(15)" id="time-15" class="time-btn btn-time py-2 rounded-lg bg-slate-800 text-[10px] font-bold border border-slate-700 text-slate-400">15s</button>
                        <button onclick="setTimer(20)" id="time-20" class="time-btn btn-time py-2 rounded-lg bg-slate-800 text-[10px] font-bold border border-slate-700 text-slate-400">20s</button>
                        <button onclick="setTimer(30)" id="time-30" class="time-btn btn-time py-2 rounded-lg bg-slate-800 text-[10px] font-bold border border-slate-700 text-slate-400">30s</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Prompt Display Area -->
        <div class="glass p-8 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col items-center justify-center min-h-[300px]">
            <div id="progress-container" class="absolute top-0 left-0 w-full h-1.5 bg-slate-800 hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 progress-bar w-0"></div>
            </div>

            <div id="prompt-container" class="text-center w-full">
                <div id="main-prompt-ui" class="flex flex-col items-center justify-center gap-2">
                    <div class="flex items-center gap-6">
                        <span id="display-degree" class="text-9xl font-black text-white leading-none tracking-tighter">--</span>
                        <div class="flex flex-col items-start gap-1">
                            <span id="display-interval-label" class="text-4xl font-bold text-slate-500 uppercase leading-none">--</span>
                            <span id="direction-indicator" class="hidden px-2 py-1 rounded text-xs font-black uppercase tracking-widest border border-transparent">UP</span>
                        </div>
                    </div>
                </div>
                
                <div id="finish-overlay" class="hidden absolute inset-0 bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center z-10 p-6 text-center">
                    <div class="text-emerald-400 mb-4 bg-emerald-400/10 p-4 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Deck Cleared</h2>
                    <p id="finish-message" class="text-slate-400 text-sm mb-6">Mastered all combinations.</p>
                    <button onclick="restartSession()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold transition shadow-lg shadow-emerald-900/20 active:scale-95 text-white uppercase tracking-widest">Reshuffle Deck</button>
                </div>

                <div id="answer-container" class="opacity-0 transition-opacity duration-300 mt-8 flex flex-col items-center">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Target Degree</p>
                    <div id="display-answer" class="text-6xl font-black text-emerald-400">?</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showAnswer()" id="btn-show" class="bg-slate-700 hover:bg-slate-600 py-5 rounded-2xl font-bold transition shadow-lg active:scale-95 text-sm uppercase tracking-widest">
                Show Answer
            </button>
            <button onclick="nextRound()" class="bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-bold transition shadow-lg active:scale-95 text-sm uppercase tracking-widest text-white">
                Next Prompt
            </button>
        </div>

        <button onclick="resetApp()" class="w-full text-slate-600 text-[10px] font-bold uppercase tracking-widest hover:text-slate-400 transition mt-2">Reset Session</button>
    </div>

    <script>
        const state = {
            selectedIntervals: [],
            timer: 0,
            direction: 'up', 
            activePromptDirection: 'up',
            currentDegree: 0,
            currentInterval: 0,
            isStarted: false,
            isFinished: false,
            isShowingAnswer: false,
            noRepeat: false,
            pool: [],
            totalInPool: 0,
            timerInterval: null,
            revealTimeout: null
        };

        function updateIntervalUI() {
            document.querySelectorAll('.int-btn').forEach(btn => {
                const val = parseInt(btn.id.split('-')[1]);
                if (state.selectedIntervals.includes(val)) btn.classList.add('active-int');
                else btn.classList.remove('active-int');
            });
        }

        function setDirection(dir) {
            state.direction = dir;
            document.querySelectorAll('.dir-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`dir-${dir}`).classList.add('active');
            
            if (state.noRepeat) resetPool();
            if (state.isStarted && !state.isFinished) nextRound();
            updateDisplay();
        }

        function toggleInterval(val) {
            const index = state.selectedIntervals.indexOf(val);
            if (index > -1) state.selectedIntervals.splice(index, 1);
            else state.selectedIntervals.push(val);
            
            updateIntervalUI();
            if (state.noRepeat) resetPool();

            if (state.selectedIntervals.length > 0) {
                if (!state.isStarted || state.isFinished) {
                    state.isStarted = true;
                    state.isFinished = false;
                    nextRound();
                }
            } else {
                state.isStarted = false;
                resetStateUI();
            }
            updateDisplay();
        }

        function bulkSelect(shouldSelectAll) {
            state.selectedIntervals = shouldSelectAll ? [2, 3, 4, 5, 6, 7] : [];
            updateIntervalUI();
            if (state.noRepeat) resetPool();
            
            if (shouldSelectAll) {
                state.isStarted = true;
                state.isFinished = false;
                nextRound();
            } else {
                state.isStarted = false;
                resetStateUI();
            }
            updateDisplay();
        }

        function resetPool() {
            if (state.selectedIntervals.length === 0) {
                state.pool = [];
                state.totalInPool = 0;
                return;
            }

            const degrees = [1, 2, 3, 4, 5, 6, 7];
            const directions = state.direction === 'random' ? ['up', 'down'] : [state.direction];
            state.pool = [];

            state.selectedIntervals.forEach(intVal => {
                degrees.forEach(deg => {
                    directions.forEach(dir => {
                        state.pool.push({ deg, int: intVal, dir });
                    });
                });
            });

            state.totalInPool = state.pool.length;
            // Shuffle
            for (let i = state.pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.pool[i], state.pool[j]] = [state.pool[j], state.pool[i]];
            }
        }

        function toggleNoRepeat() {
            state.noRepeat = !state.noRepeat;
            const circle = document.getElementById('toggle-circle');
            const toggle = document.getElementById('repeat-toggle');
            const counterSection = document.getElementById('cycle-status');

            if (state.noRepeat) {
                circle.style.transform = 'translateX(24px)';
                toggle.classList.replace('bg-slate-700', 'bg-emerald-500');
                counterSection.classList.remove('hidden');
                resetPool(); 
            } else {
                circle.style.transform = 'translateX(0px)';
                toggle.classList.replace('bg-emerald-500', 'bg-slate-700');
                counterSection.classList.add('hidden');
            }
            if (state.isStarted && !state.isFinished) nextRound();
            updateDisplay();
        }

        function setTimer(val) {
            state.timer = val;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`time-${val}`).classList.add('active');
            if (state.isStarted && !state.isFinished) startTimer();
        }

        function updateDisplay() {
            const label = document.getElementById('display-interval-label');
            const deg = document.getElementById('display-degree');
            const counter = document.getElementById('cycle-counter');
            const overlay = document.getElementById('finish-overlay');
            const dirIndicator = document.getElementById('direction-indicator');
            const answerContainer = document.getElementById('answer-container');
            
            if (state.isFinished) overlay.classList.remove('hidden');
            else overlay.classList.add('hidden');

            if (state.selectedIntervals.length === 0) {
                label.innerText = "--";
                deg.innerText = "--";
                dirIndicator.classList.add('hidden');
                answerContainer.style.opacity = '0';
            } else {
                deg.innerText = state.currentDegree || "--";
                const suffix = state.currentInterval === 2 ? 'nd' : state.currentInterval === 3 ? 'rd' : 'th';
                label.innerText = state.currentInterval + suffix;
                label.classList.remove('text-slate-500');
                label.classList.add('text-white');

                dirIndicator.classList.remove('hidden');
                dirIndicator.innerText = state.activePromptDirection;
                if (state.activePromptDirection === 'up') {
                    dirIndicator.className = "px-2 py-1 rounded text-xs font-black uppercase tracking-widest border border-yellow-500/50 bg-yellow-500/10 text-yellow-400";
                } else {
                    dirIndicator.className = "px-2 py-1 rounded text-xs font-black uppercase tracking-widest border border-red-500/50 bg-red-500/10 text-red-400";
                }
                
                if (state.noRepeat) {
                    const completed = state.totalInPool - state.pool.length;
                    counter.innerText = `${completed} / ${state.totalInPool}`;
                }
            }
            
            document.getElementById('display-answer').innerText = calculateTarget();
            answerContainer.style.opacity = state.isShowingAnswer ? '1' : '0';
        }

        function calculateTarget() {
            if (state.currentDegree === 0 || state.currentInterval === 0) return "?";
            const offset = state.currentInterval - 1;
            let target = state.activePromptDirection === 'up' ? state.currentDegree + offset : state.currentDegree - offset;
            while (target > 7) target -= 7;
            while (target < 1) target += 7;
            return target;
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            clearTimeout(state.revealTimeout);
            const progressBar = document.getElementById('progress-bar');
            const container = document.getElementById('progress-container');
            
            if (state.timer <= 0 || !state.isStarted || state.isFinished) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            let elapsed = 0;
            const duration = state.timer * 1000;
            const step = 50; 

            state.timerInterval = setInterval(() => {
                elapsed += step;
                let progress = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(progress, 100) + '%';
                
                if (progress >= 100) {
                    clearInterval(state.timerInterval);
                    showAnswer();
                    state.revealTimeout = setTimeout(() => nextRound(), 2000);
                }
            }, step);
        }

        function showAnswer() {
            state.isShowingAnswer = true;
            updateDisplay();
        }

        function nextRound() {
            if (state.selectedIntervals.length === 0) return;
            clearTimeout(state.revealTimeout);
            
            if (state.noRepeat && state.pool.length === 0) {
                finishSession();
                return;
            }

            state.isShowingAnswer = false;
            state.isFinished = false;

            if (state.noRepeat) {
                const item = state.pool.pop();
                state.currentDegree = item.deg;
                state.currentInterval = item.int;
                state.activePromptDirection = item.dir;
            } else {
                state.activePromptDirection = state.direction === 'random' ? (Math.random() > 0.5 ? 'up' : 'down') : state.direction;
                state.currentInterval = state.selectedIntervals[Math.floor(Math.random() * state.selectedIntervals.length)];
                let newDeg;
                do { newDeg = Math.floor(Math.random() * 7) + 1; } while (newDeg === state.currentDegree && state.selectedIntervals.length < 2);
                state.currentDegree = newDeg;
            }
            
            updateDisplay();
            if (state.timer > 0) startTimer();
        }

        function finishSession() {
            state.isFinished = true;
            state.isStarted = false;
            clearInterval(state.timerInterval);
            updateDisplay();
        }

        function restartSession() {
            resetPool();
            state.isFinished = false;
            state.isStarted = true;
            nextRound();
        }

        function resetApp() {
            state.selectedIntervals = [];
            state.isStarted = false;
            state.isFinished = false;
            state.currentDegree = 0;
            state.currentInterval = 0;
            clearInterval(state.timerInterval);
            clearTimeout(state.revealTimeout);
            updateIntervalUI();
            resetPool();
            updateDisplay();
        }

        function resetStateUI() {
            document.getElementById('progress-container').classList.add('hidden');
            clearInterval(state.timerInterval);
        }

        window.onload = () => {
            setDirection('up');
            setTimer(0);
        };
    </script>
</body>
</html>
